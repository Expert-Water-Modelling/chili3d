name: Chili3D CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci
              env:
                  NODE_OPTIONS: --max-old-space-size=4096

            - name: Run unit tests
              run: npm test
              env:
                  NODE_OPTIONS: --max-old-space-size=4096

            - name: Write .env for build
              run: echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env

            - name: Build (production)
              run: npm run build
              env:
                  CI: false
                  NODE_OPTIONS: --max-old-space-size=4096

            - name: Deploy to server
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              env:
                  SSH_HOST: ${{ secrets.HOST }}
                  SSH_USER: ${{ secrets.USERNAME }}
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
              run: |
                  set -ex

                  sudo apt-get update -qq
                  sudo apt-get install -y -qq openssh-client

                  mkdir -p ~/.ssh && chmod 700 ~/.ssh
                  KEY="$HOME/.ssh/id_deploy"
                  printf '%s\n' "$SSH_PRIVATE_KEY" > "$KEY"
                  chmod 600 "$KEY"

                  mkdir -p ~/.ssh-ctl && chmod 700 ~/.ssh-ctl
                  CTL="$HOME/.ssh-ctl/deploy.sock"
                  SSH_OPTS="-i $KEY -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o PreferredAuthentications=publickey -o LogLevel=ERROR -o ControlMaster=auto -o ControlPath=$CTL -o ControlPersist=10m"

                  echo "=== Step 1: Open master connection ==="
                  ssh $SSH_OPTS -o ConnectTimeout=15 -fN "$SSH_USER@$SSH_HOST"

                  echo "=== Step 2: Verify master is responsive ==="
                  ssh $SSH_OPTS -O check "$SSH_USER@$SSH_HOST"

                  trap 'ssh $SSH_OPTS -O exit "$SSH_USER@$SSH_HOST" 2>/dev/null || true; rm -f "$KEY"' EXIT

                  echo "=== Step 3: Simple test command through master ==="
                  ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" 'echo "ping ok"; whoami; date; df -h / | tail -1'

                  echo "=== Step 4: Size of local dist/ ==="
                  du -sh dist

                  echo "=== Step 5: Stream tar of dist/ to server ==="
                  tar -cf - dist | ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
                    'cd /home/ubuntu/Projects/chili3d && rm -rf dist && tar -xf - && echo "extracted $(find dist -type f | wc -l) files"'

                  echo "=== Step 6: pm2 reload ==="
                  ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" 'bash -s' <<'REMOTE_SCRIPT' 2>&1
                  set -e
                  # Bypass nvm auto-activation (default alias is missing on this server
                  # and its init fails under set -e). Point directly at the installed
                  # node bin directory, which also contains pm2.
                  NODE_BIN="$HOME/.nvm/versions/node/v20.20.1/bin"
                  [ -x "$NODE_BIN/node" ] || { echo "node not found at $NODE_BIN"; exit 1; }
                  export PATH="$NODE_BIN:$PATH"

                  echo "node: $(node -v)  pm2: $(command -v pm2)"
                  pm2 reload chili3d
                  REMOTE_SCRIPT

                  echo "=== Done ==="